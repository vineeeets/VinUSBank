server:
  port: 8086

spring:
  application:
    name: card-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/vinusbank_card?createDatabaseIfNotExist=true
    username: vinusbank_user
    password: vinusbank_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
